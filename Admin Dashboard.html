<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }
    .sidebar {
      height: 100vh;
      background-color: #343a40;
      color: white;
      padding-top: 20px;
    }
    .sidebar a {
      color: white;
      display: block;
      padding: 10px;
      text-decoration: none;
    }
    .sidebar a:hover {
      background-color: #495057;
    }
    .card {
      border-radius: 15px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">My Dashboard</span>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    
    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
      <h4 class="text-center">Menu</h4>
      <a href="#">Home</a>
      <a href="#">Analytics</a>
      <a href="#">Users</a>
      <a href="#">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">
      
      <!-- Cards -->
      <div class="row">
        <div class="col-md-3">
          <div class="card text-white bg-primary p-3">
            <h5>Total Users</h5>
            <h3>1,250</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-white bg-success p-3">
            <h5>Revenue</h5>
            <h3>$5,200</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-white bg-warning p-3">
            <h5>Orders</h5>
            <h3>320</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-white bg-danger p-3">
            <h5>Pending</h5>
            <h3>25</h3>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="mt-5">
        <h4>Recent Users</h4>
        <table class="table table-striped">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>John Doe</td>
              <td>john@example.com</td>
              <td>Active</td>
            </tr>
            <tr>
              <td>Jane Smith</td>
              <td>jane@example.com</td>
              <td>Inactive</td>
            </tr>
            <tr>
              <td>Mike Johnson</td>
              <td>mike@example.com</td>
              <td>Active</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

</body>
</html>
